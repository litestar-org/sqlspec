name: Manual Benchmarks

on:
  workflow_dispatch:
    inputs:
      driver:
        description: "Benchmark driver or all"
        required: true
        default: "sqlite"
        type: choice
        options:
          - sqlite
          - aiosqlite
          - duckdb
          - asyncpg
          - psycopg
          - psycopg_async
          - psqlpy
          - cockroach_asyncpg
          - cockroach_psycopg
          - cockroach_psycopg_async
          - aiomysql
          - asyncmy
          - pymysql
          - mysqlconnector
          - mysqlconnector_async
          - oracledb
          - oracledb_async
          - adbc
          - spanner
          - bigquery
          - all
      rows:
        description: "Rows per scenario"
        required: true
        default: "500"
      iterations:
        description: "Timed iterations per scenario"
        required: true
        default: "3"
      warmup:
        description: "Warmup iterations"
        required: true
        default: "1"

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -pmysql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      oracle:
        image: gvenzl/oracle-free:23-slim-faststart
        env:
          ORACLE_PASSWORD: oracle
        ports:
          - 1521:1521
        options: >-
          --health-cmd "healthcheck.sh"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run benchmark matrix
        env:
          SQLSPEC_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/postgres
          SQLSPEC_MYSQL_DSN: mysql://root:mysql@localhost:3306/test
          SQLSPEC_ORACLE_DSN: localhost:1521/FREEPDB1
          SQLSPEC_ORACLE_USER: system
          SQLSPEC_ORACLE_PASSWORD: oracle
        run: >
          uv run python tools/scripts/bench.py
          --driver "${{ inputs.driver }}"
          --rows "${{ inputs.rows }}"
          --iterations "${{ inputs.iterations }}"
          --warmup "${{ inputs.warmup }}"
          --json-output benchmark-results.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: benchmark-results.json
